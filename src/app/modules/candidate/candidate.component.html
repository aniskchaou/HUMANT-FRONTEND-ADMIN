<div class="container mt-4">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h2>Candidate Management</h2>
    <button class="btn btn-primary" (click)="openCreate()">+ Add Candidate</button>
  </div>

  <div *ngIf="error" class="alert alert-danger">{{ error }}</div>
  <div *ngIf="successMsg" class="alert alert-success">{{ successMsg }}</div>

  <!-- Add / Edit Form -->
  <div *ngIf="showForm" class="card mb-4">
    <div class="card-header">{{ editingId ? 'Edit Candidate' : 'Add Candidate' }}</div>
    <div class="card-body">
      <form [formGroup]="form" (ngSubmit)="save()">
        <div class="row">
          <div class="col-md-3">
            <label>First Name *</label>
            <input class="form-control" formControlName="firstName" />
          </div>
          <div class="col-md-3">
            <label>Last Name *</label>
            <input class="form-control" formControlName="lastName" />
          </div>
          <div class="col-md-3">
            <label>Email *</label>
            <input class="form-control" formControlName="email" type="email" />
          </div>
          <div class="col-md-3">
            <label>Phone</label>
            <input class="form-control" formControlName="phone" />
          </div>
        </div>
        <div class="row mt-2">
          <div class="col-md-3">
            <label>Status *</label>
            <select class="form-control" formControlName="status">
              <option *ngFor="let s of statuses" [value]="s">{{ s }}</option>
            </select>
          </div>
        </div>
        <div class="mt-3">
          <button class="btn btn-success me-2" type="submit" [disabled]="form.invalid || saving">
            {{ saving ? 'Saving...' : 'Save' }}
          </button>
          <button class="btn btn-secondary" type="button" (click)="cancel()">Cancel</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Table -->
  <div *ngIf="loading" class="text-center p-4">Loading...</div>
  <table *ngIf="!loading" class="table table-bordered table-hover">
    <thead class="thead-light">
      <tr>
        <th>Name</th>
        <th>Email</th>
        <th>Phone</th>
        <th>Status</th>
        <th>Resume</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let c of candidates">
        <td>{{ c.firstName }} {{ c.lastName }}</td>
        <td>{{ c.email }}</td>
        <td>{{ c.phone }}</td>
        <td>
          <select class="form-control form-control-sm"
                  [value]="c.status"
                  (change)="changeStatus(c, $event.target['value'])"
                  [disabled]="statusUpdatingId === c.id">
            <option *ngFor="let s of statuses" [value]="s">{{ s }}</option>
          </select>
        </td>
        <td>
          <span *ngIf="c.resumePath" class="badge badge-success me-1">Uploaded</span>
          <label class="btn btn-sm btn-outline-secondary mb-0">
            {{ uploadingId === c.id ? 'Uploading...' : 'Upload Resume' }}
            <input type="file" accept=".pdf,.doc,.docx" hidden
                   (change)="onFileSelect($event, c.id)"
                   [disabled]="uploadingId === c.id" />
          </label>
        </td>
        <td>
          <button class="btn btn-sm btn-warning me-1" (click)="openEdit(c)">Edit</button>
          <button class="btn btn-sm btn-danger" (click)="delete(c.id)">Delete</button>
        </td>
      </tr>
      <tr *ngIf="candidates.length === 0">
        <td colspan="6" class="text-center text-muted">No candidates found.</td>
      </tr>
    </tbody>
  </table>
</div>

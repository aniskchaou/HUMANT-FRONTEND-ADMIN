<div class="container-fluid mt-4">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h2>Recruitment Pipeline</h2>
    <button class="btn btn-primary" (click)="showAddForm = !showAddForm">
      {{ showAddForm ? 'Cancel' : '+ Add to Pipeline' }}
    </button>
  </div>

  <div *ngIf="error" class="alert alert-danger">{{ error }}</div>
  <div *ngIf="successMsg" class="alert alert-success">{{ successMsg }}</div>

  <!-- Add Entry Form -->
  <div *ngIf="showAddForm" class="card mb-4">
    <div class="card-header">Add Candidate to Pipeline</div>
    <div class="card-body">
      <form [formGroup]="addForm" (ngSubmit)="addEntry()">
        <div class="row">
          <div class="col-md-4">
            <label>Candidate *</label>
            <select class="form-control" formControlName="candidateId">
              <option value="">-- Select Candidate --</option>
              <option *ngFor="let c of candidates" [value]="c.id">{{ c.firstName }} {{ c.lastName }}</option>
            </select>
          </div>
          <div class="col-md-3">
            <label>Initial Stage *</label>
            <select class="form-control" formControlName="stage">
              <option *ngFor="let s of stages" [value]="s">{{ s }}</option>
            </select>
          </div>
          <div class="col-md-5">
            <label>Notes</label>
            <input class="form-control" formControlName="notes" placeholder="Optional notes" />
          </div>
        </div>
        <div class="mt-3">
          <button class="btn btn-success" type="submit" [disabled]="addForm.invalid || saving">
            {{ saving ? 'Adding...' : 'Add' }}
          </button>
        </div>
      </form>
    </div>
  </div>

  <!-- Stage Board -->
  <div *ngIf="loading" class="text-center p-4">Loading...</div>
  <div *ngIf="!loading" class="d-flex" style="overflow-x:auto; gap:12px; align-items:flex-start;">
    <div *ngFor="let stage of stages" class="card" style="min-width:200px; flex:0 0 200px; background:#f8f9fa;">
      <div class="card-header text-white text-center font-weight-bold"
           [ngClass]="{
             'bg-secondary': stage === 'APPLIED',
             'bg-info': stage === 'SCREENING',
             'bg-primary': stage === 'INTERVIEW',
             'bg-warning': stage === 'OFFER',
             'bg-success': stage === 'HIRED',
             'bg-danger': stage === 'REJECTED'
           }">
        {{ stage }}
        <span class="badge badge-light ml-1">{{ stagesMap[stage].length }}</span>
      </div>
      <div class="card-body p-2">
        <div *ngIf="stagesMap[stage].length === 0" class="text-muted small text-center mt-2">No candidates</div>
        <div *ngFor="let entry of stagesMap[stage]" class="card mb-2 shadow-sm">
          <div class="card-body p-2">
            <div class="font-weight-bold small">{{ candidateName(entry) }}</div>
            <div *ngIf="entry.notes" class="text-muted" style="font-size:11px;">{{ entry.notes }}</div>
            <div class="mt-2">
              <label style="font-size:11px;" class="mb-1">Move to:</label>
              <select class="form-control form-control-sm"
                      (change)="moveToStage(entry, $any($event.target).value)">
                <option value="">-- Stage --</option>
                <option *ngFor="let s of stagesExcluding(entry.stage)" [value]="s">{{ s }}</option>
              </select>
            </div>
            <button class="btn btn-link btn-sm text-danger p-0 mt-1" (click)="removeEntry(entry.id)">Remove</button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

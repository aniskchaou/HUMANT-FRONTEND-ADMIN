<div id="app" *ngIf="!hasRoute('login')" class="app-shell">
  <app-navigation></app-navigation>
  <div id="main" class="layout-navbar">
    <header class="app-topbar">
      <nav class="navbar navbar-expand premium-navbar">
        <div class="container-fluid app-topbar-inner">
          <div class="app-topbar-start">
            <button type="button" class="burger-btn d-block" aria-label="Toggle navigation">
              <i class="bi bi-layout-sidebar-inset"></i>
            </button>

            <div class="app-page-meta">
              <span class="app-page-kicker">{{ getCurrentPageTag() }}</span>
              <h1>{{ getCurrentPageTitle() }}</h1>
              <p>{{ getCurrentPageSummary() }}</p>
            </div>
          </div>

          <div class="app-topbar-actions">
            <span class="app-live-pill">
              <span class="app-live-dot"></span>
              Ready for review
            </span>

            <ul class="navbar-nav app-toolbar-list">
              <li class="nav-item dropdown">
                <app-messages></app-messages>
              </li>
              <li class="nav-item dropdown">
                <app-shortcut-menu></app-shortcut-menu>
              </li>
            </ul>

            <div class="dropdown">
              <app-user-menu></app-user-menu>
            </div>
          </div>
        </div>
      </nav>
    </header>
    <div id="main-content" class="app-content">
      <router-outlet></router-outlet>
      <app-footer></app-footer>
    </div>
  </div>
</div>

<div *ngIf="hasRoute('login')">
  <app-login></app-login>
</div>

<script src="/assets/vendors/perfect-scrollbar/perfect-scrollbar.min.js"></script>
<script src="/assets/js/bootstrap.bundle.min.js"></script>

<script src="/assets/js/main.js"></script>

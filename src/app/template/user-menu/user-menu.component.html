<a
  href="#"
  data-bs-toggle="dropdown"
  aria-expanded="false"
  class="user-menu-trigger"
>
  <div class="user-menu d-flex align-items-center">
    <div class="user-name text-end me-3">
      <span class="user-role">Workspace owner</span>
      <h6 class="mb-0">{{ displayName }}</h6>
      <p class="mb-0 text-sm">{{ workspaceLabel }}</p>
    </div>
    <div class="user-avatar-shell">
      <div class="avatar avatar-md">
        <img *ngIf="hasAvatarPhoto" [src]="avatarPhoto" [alt]="displayName + ' profile photo'" />
        <div *ngIf="!hasAvatarPhoto" class="user-avatar-fallback">{{ initials }}</div>
      </div>
      <span class="user-availability"></span>
    </div>
  </div>
</a>
<ul
  class="dropdown-menu dropdown-menu-end user-menu-dropdown"
>
  <li class="dropdown-header-block">
    <div>
      <span class="dropdown-eyebrow">Signed in as</span>
      <h6>{{ displayName }}</h6>
    </div>
    <span class="dropdown-count">{{ roleLabel }}</span>
  </li>
  <li>
    <a class="dropdown-item user-menu-item" routerLink="/profile">
      <i class="bi bi-person-circle"></i>
      <span>My profile</span>
    </a>
  </li>
  <li>
    <a class="dropdown-item user-menu-item" routerLink="/configuration">
      <i class="bi bi-sliders"></i>
      <span>Workspace settings</span>
    </a>
  </li>
  <li>
    <button
      type="button"
      class="dropdown-item user-menu-item user-menu-logout"
      (click)="logOut()"
    >
      <i class="bi bi-box-arrow-right"></i>
      <span>Sign out</span>
    </button>
  </li>
</ul>
